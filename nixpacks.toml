[phases.setup]
nixPkgs = ['php83', 'php83Extensions.pdo_mysql', 'php83Extensions.mbstring', 'php83Extensions.xml', 'php83Extensions.curl', 'php83Extensions.bcmath', 'php83Extensions.tokenizer', 'nodejs_22']

[phases.install]
cmds = [
    'composer install --no-dev --optimize-autoloader',
    'npm ci'
]

[phases.build]
cmds = [
    'npm run build',
    'php artisan route:cache',
    'php artisan view:cache',
    'php artisan migrate --force',
    'php artisan storage:link'
]

[start]
cmd = 'php artisan config:cache && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}'

